<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Recorder - Professional</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000052;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #0c1232;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        #video-preview {
            width: 100%;
            height: auto;
            max-height: 500px;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid #e5e7eb;
            background-color: #000;
        }
        .btn {
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            white-space: nowrap;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-green {
            background-color: #10b981;
        }
        .btn-green:hover {
            background-color: #059669;
        }
        .btn-red {
            background-color: #ef4444;
        }
        .btn-red:hover {
            background-color: #dc2626;
        }
        .btn-blue {
            background-color: #3b82f6;
        }
        .btn-blue:hover {
            background-color: #2563eb;
        }
        .btn:disabled {
            background-color: #a3a3a3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .checkbox-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="text-4xl sm:text-8xl font-extrabold text-gray-900 mb-4" style="color: #2962ff;">
            Recorder Studio Light
        </h1>
        <p class="text-lg text-gray-600 mb-8" style="color: #5aa389;">
            Capture your screen with audio. Best experience for <b>Chrome</b> browser. If you face any issue then refresh tab.
        </p>

        <video id="video-preview" autoplay playsinline muted></video>

        <div class="checkbox-container">
            <div class="checkbox-group">
                <!-- Added 'checked' to enable by default -->
                <input type="checkbox" id="systemAudioCheckbox" class="h-4 w-4 text-green-600 rounded" checked>
                <label for="systemAudioCheckbox" class="ml-2 text-gray-700" style="color: #66ffde">System Audio</label>
            </div>
            <div class="checkbox-group">
                <!-- Added 'checked' to enable by default -->
                <input type="checkbox" id="micAudioCheckbox" class="h-4 w-4 text-green-600 rounded" checked>
                <label for="micAudioCheckbox" class="ml-2 text-gray-700" style="color: #66ffde">Microphone</label>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-4 mb-8">
            <button id="startButton" class="btn btn-green">
                Start Recording
            </button>
            <button id="pauseButton" class="btn btn-blue" disabled>
                Pause
            </button>
            <button id="stopButton" class="btn btn-red" disabled>
                Stop Recording
            </button>
        </div>

        <p id="status" class="text-sm font-medium text-gray-500 mb-4">
            Select audio options and click 'Start'.
        </p>

        <div id="download-area" class="mt-8 hidden">
            <a id="download-link" href="#" download="my-screen-recording.webm" class="text-blue-600 underline text-lg font-semibold hover:text-blue-800">
                Download Recording
            </a>
            <p class="text-sm text-gray-500 mt-2">Your recording is ready for download.</p>
        </div>
    </div>

    <script>
        const videoPreview = document.getElementById('video-preview');
        const startButton = document.getElementById('startButton');
        const pauseButton = document.getElementById('pauseButton');
        const stopButton = document.getElementById('stopButton');
        const systemAudioCheckbox = document.getElementById('systemAudioCheckbox');
        const micAudioCheckbox = document.getElementById('micAudioCheckbox');
        const statusText = document.getElementById('status');
        const downloadArea = document.getElementById('download-area');
        const downloadLink = document.getElementById('download-link');
        
        let mediaRecorder;
        let recordedChunks = [];
        let stream;
        let audioContext;
        let micAudioTrack;
        let micStream;
        let displayStream; // Keep track of screen capture stream

        const startRecording = async () => {
            recordedChunks = [];
            videoPreview.srcObject = null;
            videoPreview.removeAttribute('controls');
            videoPreview.src = null;

            const systemAudioEnabled = systemAudioCheckbox.checked;
            const micAudioEnabled = micAudioCheckbox.checked;

            if (!systemAudioEnabled && !micAudioEnabled) {
                statusText.textContent = "Please select at least one audio source.";
                return;
            }

            try {
                displayStream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: systemAudioEnabled
                });

                const videoTrack = displayStream.getVideoTracks()[0];
                const audioTracksToMix = [];

                if (systemAudioEnabled && displayStream.getAudioTracks().length > 0) {
                    audioTracksToMix.push(displayStream.getAudioTracks()[0]);
                }

                if (micAudioEnabled) {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    micAudioTrack = micStream.getAudioTracks()[0];
                    if (micAudioTrack) {
                        audioTracksToMix.push(micAudioTrack);
                    }
                }
                
                videoPreview.srcObject = displayStream; 
                videoPreview.muted = true;

                if (audioTracksToMix.length > 0) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const dest = audioContext.createMediaStreamDestination();
                    
                    const gainNode = audioContext.createGain();
                    gainNode.gain.value = 2.2;
                    gainNode.connect(dest);

                    audioTracksToMix.forEach(track => {
                        const source = audioContext.createMediaStreamSource(new MediaStream([track]));
                        source.connect(gainNode);
                    });
                    
                    stream = new MediaStream([videoTrack, dest.stream.getAudioTracks()[0]]);
                } else {
                    stream = new MediaStream([videoTrack]);
                }
                
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    
                    downloadLink.href = url;
                    
                    videoPreview.srcObject = null;
                    videoPreview.src = url;
                    videoPreview.controls = true;
                    videoPreview.muted = false;
                    
                    downloadArea.classList.remove('hidden');
                    statusText.textContent = "Recording finished. You can preview and download your video below.";
                    
                    // Stop all tracks to clean up and hide the "Sharing screen" popup
                    if (stream) stream.getTracks().forEach(track => track.stop());
                    if (displayStream) displayStream.getTracks().forEach(track => track.stop());
                    if (micStream) micStream.getTracks().forEach(track => track.stop());

                    if (audioContext) audioContext.close();
                    
                    micStream = null;
                    micAudioTrack = null;
                    displayStream = null;
                };

                videoTrack.onended = () => {
                    stopRecording();
                };
                
                mediaRecorder.start();
                
                startButton.disabled = true;
                pauseButton.disabled = false;
                stopButton.disabled = false;
                systemAudioCheckbox.disabled = true;
                downloadArea.classList.add('hidden');
                statusText.textContent = "Recording started...";
            } catch (err) {
                console.error("Error accessing media devices:", err);
                statusText.textContent = "Error: Could not start recording. Please check permissions.";
                
                startButton.disabled = false;
                pauseButton.disabled = true;
                stopButton.disabled = true;
                
                if (micStream) {
                    micStream.getTracks().forEach(track => track.stop());
                    micStream = null;
                }
                if (displayStream) {
                    displayStream.getTracks().forEach(track => track.stop());
                    displayStream = null;
                }
            }
        };

        const togglePauseResume = () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.pause();
                pauseButton.textContent = 'Resume';
                statusText.textContent = "Recording paused...";
            } else if (mediaRecorder && mediaRecorder.state === 'paused') {
                mediaRecorder.resume();
                pauseButton.textContent = 'Pause';
                statusText.textContent = "Recording resumed...";
            }
        };

        const stopRecording = () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                
                // Force stopping all tracks immediately to remove the browser popup
                if (stream) stream.getTracks().forEach(track => track.stop());
                if (displayStream) displayStream.getTracks().forEach(track => track.stop());
                if (micStream) micStream.getTracks().forEach(track => track.stop());

                startButton.disabled = false;
                pauseButton.disabled = true;
                stopButton.disabled = true;
                systemAudioCheckbox.disabled = false;
                micAudioCheckbox.disabled = false;
                statusText.textContent = "Processing recording...";
            }
        };

        startButton.addEventListener('click', startRecording);
        pauseButton.addEventListener('click', togglePauseResume);
        stopButton.addEventListener('click', stopRecording);
        
        micAudioCheckbox.addEventListener('change', (e) => {
            if (micAudioTrack) {
                micAudioTrack.enabled = e.target.checked;
            }
        });
    </script>
</body>
</html>
